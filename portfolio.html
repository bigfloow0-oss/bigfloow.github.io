<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BiG FlooW | Portfolio Graphisme</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#0d0d0d;
    color:#fff;
}

/* NAVBAR */
.navbar{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index:1000;
}

.logo{
    font-weight:800;
    font-size:1.5rem;
}

.logo span{
    color:#007FFF;
}

/* HERO */
.hero{
    height:60vh;
    background:url('home1.jpeg') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.7);
}

.hero h1{
    position:relative;
    font-size:3rem;
    text-transform:uppercase;
    font-family:'Montserrat', sans-serif;
}

/* GRID */
.portfolio{
    padding:100px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:10px;
    cursor:pointer;
    transition:0.4s;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
    transition:0.5s;
}

.card:hover img{
    transform:scale(1.1);
}

/* OVERLAY */
.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    display:flex;
    align-items:flex-end;
    padding:20px;
    opacity:0;
    transition:0.4s;
}

.card:hover .overlay{
    opacity:1;
}

.overlay h3{
    font-size:1.2rem;
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.lightbox.active{
    opacity:1;
    pointer-events:auto;
}

.lightbox img{
    max-width:90%;
    max-height:80%;
}

.close{
    position:absolute;
    top:30px;
    right:40px;
    font-size:40px;
    cursor:pointer;
}

/* FOOTER */
footer{
    padding:40px;
    text-align:center;
    font-size:0.9rem;
    color:#aaa;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div class="logo">BiG <span>FlooW</span></div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>Graphisme</h1>
</section>

<!-- PORTFOLIO -->
<section class="portfolio">

<div class="card"><img src="concep%203.webp"><div class="overlay"><h3>Horizon Créatif</h3></div></div>

<div class="card"><img src="IMG-20221127-WA0012.webp"><div class="overlay"><h3>Affiche Pub</h3></div></div>

<div class="card"><img src="Le%20guichet.webp"><div class="overlay"><h3>Affiche Bâche</h3></div></div>

<div class="card"><img src="Jean.webp"><div class="overlay"><h3>Présentation</h3></div></div>

<div class="card"><img src="Imma%20couture.webp"><div class="overlay"><h3>Imma Couture</h3></div></div>

<div class="card"><img src="IMG-20221120-WA0022.webp"><div class="overlay"><h3>Social Media</h3></div></div>

<div class="card"><img src="Carte_visite.webp"><div class="overlay"><h3>Carte de visite</h3></div></div>

<div class="card"><img src="brochure.webp"><div class="overlay"><h3>Brochure</h3></div></div>

<div class="card"><img src="Gemini_Generated_Image_emal9zemal9zemal-Photoroom.webp"><div class="overlay"><h3>Couverture</h3></div></div>

<div class="card"><img src="package.webp"><div class="overlay"><h3>Packaging</h3></div></div>

<div class="card"><img src="C%C3%A9l%C3%A9bration%20lumineuse%20de%20l'A%C3%AFd.webp"><div class="overlay"><h3>Illustration Aïd</h3></div></div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" id="close">&times;</span>
    <img id="lightbox-img">
</div>

<!-- FOOTER -->
<footer>
    © 2026 BiG FlooW — Design by Victor HALLO
</footer>

<script>

// LIGHTBOX PRO
const cards = document.querySelectorAll('.card img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const close = document.getElementById('close');

cards.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.classList.add('active');
        lightboxImg.src = img.src;
    });
});

close.onclick = () => lightbox.classList.remove('active');

lightbox.onclick = (e)=>{
    if(e.target === lightbox){
        lightbox.classList.remove('active');
    }
};

</script>

</body>
</html>
